<!-- Updated Front-end Snippet featuring your custom logo -->
<div class="payout-container" style="text-align: center; margin: 20px auto; padding: 20px; font-family: sans-serif; max-width: 500px;">
    
    <!-- App Logo Section -->
    <div style="margin-bottom: 20px;">
        <img src="logo.png" alt="TaskCash 237 Logo" style="width: 100%; max-width: 250px; height: auto; border-radius: 8px;">
    </div>

    <!-- Language Toggle Buttons -->
    <div style="margin-bottom: 25px;">
        <button onclick="setLanguage('en')" style="padding: 6px 12px; margin: 0 5px; cursor: pointer; border: 1px solid #ccc; border-radius: 4px; background: #fff; font-weight: bold;">English</button>
        <button onclick="setLanguage('fr')" style="padding: 6px 12px; margin: 0 5px; cursor: pointer; border: 1px solid #ccc; border-radius: 4px; background: #fff; font-weight: bold;">Français</button>
    </div>

    <!-- Dynamic Titles -->
    <h2 id="payoutTitle" style="color: #1b4332; margin-bottom: 5px;">Claim Your 10,000 XAF Reward</h2>
    <p id="payoutSubtitle" style="color: #666; font-size: 14px; margin-top: 0; margin-bottom: 20px;">Enter your mobile money number starting with 237</p>

    <!-- Form Input Fields -->
    <input type="tel" id="phoneInput" placeholder="e.g., 237677777777" style="padding: 12px; width: 85%; max-width: 300px; font-size: 16px; margin-bottom: 15px; border-radius: 6px; border: 2px solid #1b4332; outline: none;"><br>
    
    <button onclick="requestPayout()" id="claimBtn" style="padding: 14px 28px; background-color: #ffaa00; color: white; border: none; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
        Withdraw Balance
    </button>
    <div style="margin-top: 25px; text-align: center;">
        <a href="auth.html" style="color: #1b4332; font-weight: bold; text-decoration: none; font-size: 14px;">
            Go to Login / Sign Up Screen →
        </a>
    </div>
</div>


<script>
let currentLang = 'en';
const translations = {
    en: {
        title: "Claim Your 10,000 XAF Reward",
        subtitle: "Enter your mobile money number starting with 237",
        button: "Withdraw Balance",
        loading: "Processing payment...",
        connError: "Connection error occurred. Please try again."
    },
    fr: {
        title: "Réclamez Votre Récompense de 10 000 XAF",
        subtitle: "Entrez votre numéro de téléphone mobile money commençant par 237",
        button: "Retirer le solde",
        loading: "Traitement du paiement...",
        connError: "Une erreur de connexion est survenue. Veuillez réessayer."
    }
};

function setLanguage(lang) {
    currentLang = lang;
    document.getElementById('payoutTitle').innerText = translations[lang].title;
    document.getElementById('payoutSubtitle').innerText = translations[lang].subtitle;
    document.getElementById('claimBtn').innerText = translations[lang].button;
}

async function requestPayout() {
    const userPhone = document.getElementById('phoneInput').value;
    const claimBtn = document.getElementById('claimBtn');
    
    claimBtn.disabled = true;
    claimBtn.innerText = translations[currentLang].loading;

    const BACKEND_URL = 'https://taskcash-backend.onrender.com/api/payout';

    try {
        const response = await fetch(BACKEND_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ phoneNumber: userPhone })
        });
        
        const data = await response.json();
        
        if (response.ok) {
            alert(data[currentLang]);
        } else {
            alert(data[currentLang]);
        }
    } catch (error) {
        alert(translations[currentLang].connError);
    } finally {
        claimBtn.disabled = false;
        claimBtn.innerText = translations[currentLang].button;
    }
}
  </script>
  
<div class="dashboard-stats" style="margin: 20px auto; padding: 15px; max-width: 400px; background: #1a1a1a; border-radius: 8px; border: 1px solid #1b4332; text-align: center;">
  <h3 style="color: #666; margin-bottom: 5px; font-size: 14px;">WALLET BALANCE</h3>
  <div id="wallet-balance" style="color: #2ec4b6; font-size: 28px; font-weight: bold;">Loading...</div>
</div>

<div class="games-section" style="margin: 20px auto; max-width: 400px;">
  <h2 style="color: #1b4332; font-size: 20px; border-bottom: 2px solid #1b4332; padding-bottom: 5px; margin-bottom: 15px;">Available Tasks & Games</h2>
  <div id="games-container" style="display: grid; gap: 15px;">
    <p style="color: #999; text-align: center;">Loading available challenges...</p>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  // Try finding the login phone number under common keys
  const phoneNumber = localStorage.getItem('userPhone') || localStorage.getItem('phoneNumber');

  // If no user session exists, send them back to log in/sign up page
  if (!phoneNumber) {
    console.warn("No active session found. Redirecting...");
    return;
  }

  // 1. Fetch live balance from backend
  fetch(`/api/user/profile?phoneNumber=${encodeURIComponent(phoneNumber)}`)
    .then(res => {
      if (!res.ok) throw new Error(`Server returned status ${res.status}`);
      return res.json();
    })
    .then(data => {
      const balanceEl = document.getElementById('wallet-balance');
      if (balanceEl) {
        balanceEl.innerText = data.balance !== undefined ? `${data.balance} XAF` : '0 XAF';
      }
    })
    .catch(err => {
      console.error('Balance tracking error:', err);
      const balanceEl = document.getElementById('wallet-balance');
      if (balanceEl) balanceEl.innerText = '0 XAF'; // Graceful default fallback
    });

  // 2. Fetch live games array
  fetch('/api/games')
    .then(res => {
      if (!res.ok) throw new Error('Failed to fetch games catalog');
      return res.json();
    })
    .then(games => {
      const container = document.getElementById('games-container');
      if (!container) return;

      container.innerHTML = '';
      games.forEach(game => {
        const gameCard = document.createElement('div');
        gameCard.style.cssText = "background: #222; padding: 15px; border-radius: 6px; border-left: 4px solid #1b4332; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.2);";
        
        gameCard.innerHTML = `
          <div style="text-align: left;">
            <h4 style="margin: 0 0 5px 0; color: #fff; font-size: 16px;">${game.name}</h4>
            <span style="color: #2ec4b6; font-size: 12px; font-weight: bold;">💰 ${game.reward}</span>
          </div>
          <button onclick="playGame('${game.id}')" style="background: #1b4332; color: white; border: none; padding: 8px 15px; border-radius: 4px; font-weight: bold; cursor: pointer;">Play</button>
        `;
        container.appendChild(gameCard);
      });
    })
    .catch(err => {
      console.error('Games catalog error:', err);
      const container = document.getElementById('games-container');
      if (container) container.innerHTML = '<p style="color: #ff4d4d; text-align: center;">Unable to load tasks at this time.</p>';
    });
});

function playGame(gameId) {
  alert(`Initializing task configuration for: ${gameId}. Earn your XAF reward payout upon completion!`);
}
</script>
